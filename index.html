<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfolio Al Farras</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#0f172a;
  color:white;
  font-family:Arial, sans-serif;
}

/* TOMBOL MENU */

.menu-btn{
  position:fixed;
  top:20px;
  left:20px;
  font-size:35px;
  cursor:pointer;
}

/* SIDEBAR */

.sidebar{
  position:fixed;
  left:-220px;
  top:0;
  width:220px;
  height:100%;
  background:#111827;
  padding-top:80px;
  transition:0.3s;
}

.sidebar a{
  display:block;
  color:white;
  text-decoration:none;
  padding:15px 30px;
}

.sidebar a:hover{
  background:#38bdf8;
}

/* HEADER */

header{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

h1{
  font-size:60px;
}

p{
  margin-top:10px;
  font-size:22px;
  color:#cbd5e1;
}

</style>

</head>

<body>

<!-- TOMBOL MENU -->

<div class="menu-btn">
☰
</div>

<!-- SIDEBAR -->

<nav class="sidebar">

  <a href="#">Home</a>

  <a href="#">Tentang</a>

  <a href="#">Contact</a>

</nav>

<!-- HEADER -->

<header>

  <h1>Halo, Saya Al Farras 👋</h1>

  <p>
    Finance Analyst | Tech Enthusiast
  </p>

</header>

<section>
  
  <h2>Tentang saya<h2>

  <p>
    Saya tertarik pada dunia finance dan teknologi

</section>
  
<script>

const menuBtn = document.querySelector(".menu-btn");
const sidebar = document.querySelector(".sidebar");

menuBtn.onclick = function(){

  if(sidebar.style.left == "0px"){
    sidebar.style.left = "-220px";
  }else{
    sidebar.style.left = "0px";
  }

}

</script>

</body>

</html>

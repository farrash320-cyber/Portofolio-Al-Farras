<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Al Farras Portfolio</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial, sans-serif;
      background:#0f172a;
      color:white;
    }

    header{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      text-align:center;
      padding:20px;
    }

    h1{
      font-size:60px;
      margin-bottom:10px;
    }

    p{
      font-size:20px;
      color:#cbd5e1;
    }

    .btn{
      margin-top:20px;
      padding:12px 24px;
      background:#38bdf8;
      color:white;
      text-decoration:none;
      border-radius:10px;
      transition:0.3s;
    }

    .btn:hover{
      background:#0ea5e9;
    }

    section{
      padding:80px 20px;
      max-width:1000px;
      margin:auto;
    }

    .card{
      background:#1e293b;
      padding:25px;
      border-radius:16px;
      margin-top:20px;
    }

    ul{
      margin-left:20px;
      margin-top:10px;
    }

  </style>
</head>

<body>

  <header>
    <h1>Halo, Saya Al Farras 👋</h1>
    <p>Finance Analyst | Tech Enthusiast</p>

    <a href="#about" class="btn">
      Tentang Saya
    </a>
  </header>

  <section id="about">

    <div class="card">
      <h2>Tentang Saya</h2>

      <p style="margin-top:15px;">
        Saya tertarik pada dunia finance,
        teknologi, dan pengembangan website modern.
      </p>
    </div>

    <div class="card">
      <h2>Skill</h2>

      <ul>
        <li>Financial Analysis</li>
        <li>Microsoft Excel</li>
        <li>HTML & CSS</li>
      </ul>
    </div>

    <div class="card">
      <h2>Project</h2>

      <p style="margin-top:15px;">
        Dashboard laporan keuangan sederhana.
      </p>
    </div>

  </section>

</body>
</html>

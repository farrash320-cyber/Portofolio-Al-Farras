<head>

<title>Portfolio Al Farras</title>

<style>

*{
  margin:0;

  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}
  
body{
  background:#0f172a;
  color:white;
  font-family:Arial, sans-serif;
}

/* TOMBOL MENU */

.menu-btn{
  position:fixed;
  top:20px;
  left:20px;
  font-size:35px;
  cursor:pointer;
  z-index:1001;
}

/* SIDEBAR */

.sidebar{
  position:fixed;
  left:-220px;
  top:0;
  width:220px;
  height:100%;
  background:#111827;
  padding-top:80px;
  transition:0.3s;
  z-index:1000;
}

.sidebar a{
  display:block;
  color:white;
  text-decoration:none;
  padding:15px 30px;
}

.sidebar a:hover{
  background:#38bdf8;
}

/* HEADER */

header{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

h1{
  font-size:60px;
}

p{
  margin-top:10px;
  font-size:22px;
  color:#cbd5e1;
}

</style>

</head>

<script>

const menuBtn = document.querySelector(".menu-btn");
const sidebar = document.querySelector(".sidebar");

let isOpen = false;

menuBtn.onclick = function(){

  if(isOpen){

    sidebar.style.left = "-220px";
    isOpen = false;
    
  }else{
    sidebar.style.left = "0";
    isOpen = true;
  }
}

</script>

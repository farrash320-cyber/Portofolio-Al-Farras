<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfolio Al Farras</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  font-family:Arial,sans-serif;

  background-image:url("mahanakhon.jpg");

  background-size:cover;

  background-position:center;

  overflow-x:hidden;
}

/* MENU BUTTON */

.menu-btn{

  position:fixed;

  top:20px;

  left:20px;

  width:55px;

  height:55px;

  border:none;

  border-radius:18px;

  background:rgba(0,0,0,0.7);

  color:white;

  font-size:22px;

  cursor:pointer;

  z-index:9999;

  backdrop-filter:blur(10px);

  transition:0.3s;
}

.menu-btn:hover{

  transform:scale(1.08);

  background:rgba(59,130,246,0.4);
}

/* SIDEBAR */

.sidebar{

  position:fixed;

  top:0;

  left:-230px;

  width:230px;

  height:100%;

  background:rgba(10,15,30,0.95);

  padding-top:100px;

  transition:0.4s;

  z-index:999;
}

.sidebar a{

  display:flex;

  align-items:center;

  gap:15px;

  margin:15px;

  padding:18px 25px;

  border-radius:20px;

  color:white;

  text-decoration:none;

  transition:0.3s;

  background:rgba(255,255,255,0.03);
}

.sidebar a:hover{

  background:rgba(59,130,246,0.2);

  transform:translateX(8px);
}

.sidebar a i{

  color:#7aa2ff;

  font-size:20px;
}

/* HOME */

header{

  height:100vh;

  display:flex;

  justify-content:center;

  align-items:center;

  flex-direction:column;

  text-align:center;
}

.profile{

  width:180px;

  height:180px;

  border-radius:50%;

  object-fit:cover;

  border:4px solid white;

  margin-bottom:20px;

  box-shadow:0 0 30px rgba(255,255,255,0.5);

  transition:0.3s;
}

.profile:hover{

  transform:scale(1.05);
}

h1{

  font-size:60px;

  color:black;
}

#typing{

  margin-top:10px;

  font-size:22px;

  color:black;

  font-weight:500;
}

/* LOGIN */

.login-btn{

  margin-top:20px;

  padding:12px 30px;

  border:none;

  border-radius:15px;

  background:#3b82f6;

  color:white;

  font-size:16px;

  cursor:pointer;

  transition:0.3s;
}

.login-btn:hover{

  background:#2563eb;

  transform:scale(1.05);
}

/* SOCIAL */

.socials{

  display:flex;

  gap:20px;

  margin-top:20px;
}

.socials a{

  padding:10px 20px;

  border-radius:15px;

  background:rgba(0,0,0,0.5);

  color:white;

  text-decoration:none;

  transition:0.3s;
}

.socials a:hover{

  background:#3b82f6;

  transform:translateY(-5px);
}

/* DASHBOARD */

#dashboard{

  display:none;

  height:100vh;

  justify-content:center;

  align-items:center;

  background:rgba(0,0,0,0.85);

  backdrop-filter:blur(10px);
}

.dashboard-box{

  width:80%;

  max-width:900px;

  padding:40px;

  border-radius:25px;

  background:rgba(255,255,255,0.05);

  box-shadow:0 0 30px rgba(59,130,246,0.3);

  text-align:center;

  color:white;
}

.cards{

  display:flex;

  justify-content:center;

  gap:20px;

  margin-top:30px;

  flex-wrap:wrap;
}

.card{

  width:220px;

  padding:30px;

  border-radius:20px;

  background:rgba(255,255,255,0.08);

  transition:0.3s;
}

.card:hover{

  transform:translateY(-10px);

  background:rgba(59,130,246,0.2);
}

.card h3{

  margin-bottom:10px;
}

.card p{

  font-size:28px;

  color:#7aa2ff;
}

.logout-btn{

  margin-top:30px;

  padding:12px 30px;

  border:none;

  border-radius:15px;

  background:#ef4444;

  color:white;

  cursor:pointer;

  transition:0.3s;
}

.logout-btn:hover{

  background:#dc2626;
}

</style>

</head>

<body>

<!-- MENU BUTTON -->

<button class="menu-btn">
☰
</button>

<!-- SIDEBAR -->

<nav class="sidebar">

<a href="index.html">
<i class="fas fa-home"></i>
Home
</a>

<a href="about.html">
<i class="fas fa-user"></i>
About Me
</a>

<a href="contact.html">
<i class="fas fa-envelope"></i>
Contact
</a>

<a href="#" onclick="login()">
<i class="fas fa-right-to-bracket"></i>
Login
</a>

</nav>

<!-- HOME -->

<header id="home">

<img src="Progress.jpg" class="profile">

<h1>Halo, Saya Al Farras 👋</h1>

<p id="typing"></p>



<div class="socials">

<a href="https://instagram.com/farrashendie_" target="_blank">

Instagram

</a>

<a href="https://github.com/farras320-cyber" target="_blank">

GitHub

</a>

<a href="https://linkedin.com/in/USERNAME" target="_blank">

LinkedIn

</a>

</div>

</header>

<!-- DASHBOARD -->

<section id="dashboard">

<div class="dashboard-box">

<h2>Welcome Back, Admin 😎🔥</h2>

<div class="cards">

<div class="card">

<h3>Balance</h3>

<p>$25,430</p>

</div>

<div class="card">

<h3>Projects</h3>

<p>12 Active</p>

</div>

<div class="card">

<h3>Performance</h3>

<p>98%</p>

</div>

</div>

<button onclick="logout()" class="logout-btn">

Logout

</button>

</div>

</section>

<script>

/* TYPING */

const text = "Finance Analyst | Tech Enthusiast";

let index = 0;

function typeText(){

  document.getElementById("typing").innerHTML =
  text.slice(0,index);

  index++;

  if(index <= text.length){

    setTimeout(typeText,100);
  }
}

typeText();

/* SIDEBAR */

const menuBtn = document.querySelector(".menu-btn");

const sidebar = document.querySelector(".sidebar");

let isOpen = false;

menuBtn.addEventListener("click", function(){

  if(isOpen){

    sidebar.style.left = "-230px";

    isOpen = false;

  }else{

    sidebar.style.left = "0";

    isOpen = true;
  }

});

/* LOGIN */

function login(){

  let username = prompt("Masukkan Username");

  let password = prompt("Masukkan Password");

  if(username === "admin" && password === "12345"){

    document.getElementById("home").style.display = "none";

    document.getElementById("dashboard").style.display = "flex";

  }else{

    alert("Username atau Password Salah 😭");
  }
}

/* LOGOUT */

function logout(){

  document.getElementById("dashboard").style.display = "none";

  document.getElementById("home").style.display = "flex";
}

</script>

</body>

</html>

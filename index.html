<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfolio Al Farras</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}
  
body{

  background-image:url("mahanakhon.jpg");

  background-size:cover;

  background-position:center;

  color:white;

  font-family:Arial,sans-serif;

  overflow-x:hidden;
}

/* TOMBOL MENU */

.menu-btn{

  position:fixed;

  top:20px;

  left:20px;

  font-size:22px;

  color:white;

  background:rgba(0,0,0,0.7);

  border:none;

  padding:10px 14px;

  border-radius:20px;

  cursor:pointer;

  z-index:99999;

  backdrop-filter:blur(15px);

  box-shadow:0 0 20px rgba(59,130,246,0.3);

  transition:0.5s;
  
  width:55px;
  
  height:55px;
}

.menu-btn:hover{

  transform:scale(1.08);

  background:rgba(59,130,246,0.3);

  box-shadow:0 0 25px rgba(59,130,246,0.7);
}

/* SIDEBAR */

.sidebar{
  position:fixed;
  left:-220px;
  top:0;
  width:220px;
  height:100%;
  background:rgba(10,15,30,0.95);
  backdorp-filter:blur(10px);
  padding-top:100px;
  transition:0.4s;
  z-index:1000;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.sidebar a{

  display:flex;

  align-items:center;

  color:white;

  text-decoration:none;

  padding:20px 25px;

  margin:15px;

  border-radius:20px;

  font-size:18px;

  font-weight:500;

  letter-spacing:0.5px;

  transition:0.3s;
}

.sidebar a:hover{

  background:rgba(59,130,246,0.2);

  box-shadow:0 0 20px rgba(59,130,246,0.5);

  transform:translateX(10px);
}

/* HEADER */

header{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  position:relative;
  z-index:1;
}

h1{
  font-size:60px;
  color:black;
}

p{
  margin-top:10px;
  font-size:22px;
  color:black;
}


.profile{

  width:180px;

  height:180px;

  border-radius:50%;

  object-fit:cover;

  border:4px solid white;

  margin-bottom:20px;
}
  
</style>

</head>

<body>

<!-- TOMBOL MENU -->

<button class="menu-btn">
☰
</button>

<!-- SIDEBAR -->

<nav class="sidebar">

  <a href="#home">Home</a>
  
  <a href="about.html">About Me</a>

  <a href="contact.html">Contact</a>

</nav>

<!-- HEADER -->

<header id="home">

<img src="Progress.jpg" class="profile">

  <h1>Halo, Saya Al Farras 👋</h1>

  <p>
    Finance Analyst | Tech Enthusiast
  </p>

<script>

const menuBtn = document.querySelector(".menu-btn");
const sidebar = document.querySelector(".sidebar");

let isOpen = false;

menuBtn.addEventListener("click", function(){

  if(isOpen){

    sidebar.style.left = "-220px";
    isOpen = false;

  }else{

    sidebar.style.left = "0";
    isOpen = true;

  }

});

</script>

</body>

</html>

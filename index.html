<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfolio Al Farras</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}
  
body{

  background-image:url("mahanakhon.jpg");

  background-size:cover;

  background-position:center;

  color:white;

  font-family:Arial,sans-serif;

  overflow-x:hidden;
}

/* TOMBOL MENU */

.menu-btn{

  position:fixed;

  top:20px;

  left:20px;

  font-size:22px;

  color:white;

  background:rgba(0,0,0,0.7);

  border:none;

  padding:10px 14px;

  border-radius:20px;

  cursor:pointer;

  z-index:99999;

  backdrop-filter:blur(15px);

  box-shadow:0 0 20px rgba(59,130,246,0.3);

  transition:0.5s;
  
  width:55px;
  
  height:55px;
}

.menu-btn:hover{

  transform:scale(1.08);

  background:rgba(59,130,246,0.3);

  box-shadow:0 0 25px rgba(59,130,246,0.7);
}

/* SIDEBAR */

.sidebar{
  position:fixed;
  left:-220px;
  top:0;
  width:220px;
  height:100%;
  background:rgba(10,15,30,0.95);
  backdorp-filter:blur(10px);
  padding-top:100px;
  transition:0.4s;
  z-index:1000;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.sidebar a{

  display:flex;

  align-items:center;

  gap:15px;

  color:white;

  text-decoration:none;

  padding:20px 25px;

  margin:15px;

  border-radius:20px;

  font-size:18px;

  font-weight:500;

  transition:0.3s;

  background:rgba(255,255,255,0.03);

  box-shadow:0 0 10px rgba(59,130,246,0.15);
}

.sidebar a i{

  color:#7aa2ff;

  font-size:20px;

  width:25px;

  text-align:center;
}

.sidebar a:hover{

  background:rgba(59,130,246,0.2);

  box-shadow:0 0 25px rgba(59,130,246,0.6);

  transform:translateX(8px);
}
/* HEADER */

header{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  position:relative;
  z-index:1;
  animation:fade 1.5s ease;
}

h1{
  font-size:60px;
  color:black;
}

p{
  margin-top:10px;
  font-size:22px;
  color:black;
}


.profile{

.profile:hover{

  transform:scale(1.05);

  transition:0.3s;
}

  width:180px;

  height:180px;

  border-radius:50%;

  object-fit:cover;

  border:4px solid white;

  margin-bottom:20px;

  box-shadow:0 0 30px rgba(255,255,255,0.5);
}

#typing{

  font-size:22px;

  color:black;

  margin-top:10px;

  font-weight:500;
}

.socials{

  margin-top:20px;

  display:flex;

  gap:20px;
}

.socials a{

  color:white;

  text-decoration:none;

  background:rgba(0,0,0,0.5);

  padding:10px 20px;

  border-radius:15px;

  transition:0.3s;

  font-size:16px;
}

.socials a:hover{

  background:#3b82f6;

  transform:translateY(-5px);
}

@keyframes fade{

  from{

    opacity:0;

    transform:translateY(30px);
  }

  to{

    opacity:1;

    transform:translateY(0);
  }
}

.sidebar a.active{

  background:rgba(59,130,246,0.2);

  box-shadow:0 0 20px rgba(59,130,246,0.5);

  color:white;
}
  
</style>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
</head>

<body>

<!-- TOMBOL MENU -->

<button class="menu-btn">
☰
</button>

<!-- SIDEBAR -->

<nav class="sidebar">

<a href="index.html">
<i class="fas fa-home"></i>
Home
</a>

<a href="about.html" class="active">
<i class="fas fa-user"></i>
About Me
</a>

<a href="contact.html" class="active">
<i class="fas fa-envelope"></i>
Contact
</a>

</nav>

<!-- HEADER -->

<header id="home">

<img src="Progress.jpg" class="profile">

  <h1>Halo, Saya Al Farras 👋</h1>

<p id="typing"></p>
  <div class="socials">

<a href="https://instagram.com/username">
Instagram
</a>

<a href="https://github.com/username">
GitHub
</a>

<a href="">
LinkedIn
</a>

</div>

<script>

const text = "Finance Analyst | Tech Enthusiast";

let index = 0;

function typeText(){

  document.getElementById("typing").innerHTML =
  text.slice(0,index);

  index++;

  if(index <= text.length){
    
    setTimeout(typeText,100);
  }
}

typeText();

const menuBtn = document.querySelector(".menu-btn");
const sidebar = document.querySelector(".sidebar");

let isOpen = false;

menuBtn.addEventListener("click", function(){

  if(isOpen){

    sidebar.style.left = "-220px";
    isOpen = false;

  }else{

    sidebar.style.left = "0";
    isOpen = true;

  }

});

</script>

</body>

</html>
